# /etc/nginx/sites-available/myflixdb
# Reverse-proxies nginx → Gunicorn (port 8000)

upstream fastapi_app {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 80;
    server_name _;   # replace with your domain or EC2 public IP

    # ── API ───────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://fastapi_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        # Large bulk inserts
        client_max_body_size 5M;
    }

    # ── Health (bypass proxy for ALB) ─────────────────────────────────
    location /health {
        proxy_pass http://fastapi_app;
    }

    # ── Security ──────────────────────────────────────────────────────
    add_header X-Frame-Options        DENY;
    add_header X-Content-Type-Options nosniff;

    # ── Logs ──────────────────────────────────────────────────────────
    access_log /var/log/nginx/myflixdb_access.log;
    error_log  /var/log/nginx/myflixdb_error.log warn;
}
